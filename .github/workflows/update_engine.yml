name: Hospital Engine Update

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 mins
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas xgboost sqlalchemy mysql-connector-python matplotlib scikit-learn

      - name: Run Prediction Engine
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        # IMPORTANT: Ensure 'working_model.py' matches your actual filename
        run: python working_model.py 

      - name: Commit and Push JSON outputs
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add *.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update hospital data [skip ci]" && git push)
