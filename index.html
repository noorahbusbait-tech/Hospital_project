<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGH Login</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('./SANG Hospitals.jpeg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 18px;
            width: 380px;
            text-align: center;
            box-shadow: 0 18px 40px rgba(0,0,0,0.20);
            border: 1px solid #eef2f7;
        }

        .login-logo {
            width: 80px;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
            font-size: 24px;
            color: #1f2937;
        }

        p.subtitle {
            color: #64748b;
            margin-bottom: 20px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin: 12px 0;
            border: 1px solid #d7e0dc;
            border-radius: 12px;
            font-size: 14px;
            background: #fff;
            outline: none;
            display: block;
        }

        input:focus {
            border-color: #167A4A;
            box-shadow: 0 0 0 3px rgba(22,122,74,0.12);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #167A4A;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: 0.2s;
            display: block;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .register-link {
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
        }

        .register-link a {
            color: #167A4A;
            text-decoration: none;
            font-weight: 700;
        }

        .error-msg {
            color: #d92d20;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
            min-height: 18px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <img src="./logo.png" class="login-logo" alt="Logo">

    <h1>National Guard Hospital</h1>
    <p class="subtitle">Bed Management Decision Support System</p>

    <div id="loginError" class="error-msg"></div>

    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="button" onclick="doLogin()">Sign in</button>

    <div class="register-link">
        Don’t have an account? 
        <a href="#" onclick="alert('Registration coming soon'); return false;">
            Register here
        </a>
    </div>
</div>

<script>
    // Pure JavaScript Login (Replaces PHP)
    function doLogin() {
        const u = document.getElementById("username").value.trim();
        const p = document.getElementById("password").value.trim();
        const errorDiv = document.getElementById("loginError");

        // Clear previous error
        errorDiv.textContent = "";

        // Check credentials (admin/1234)
        if (u === "admin" && p === "1234") {
            // Set session markers in browser
            localStorage.setItem("NGH_AUTH", "true");
            localStorage.setItem("NGH_USER", "Admin");
            
            // Redirect to dashboard
            window.location.href = "NGH_dashboard.html";
        } else {
            // Show error message
            errorDiv.textContent = "Invalid credentials. Please try again.";
        }
    }

    // Allow pressing "Enter" key to login
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            doLogin();
        }
    });
</script>

</body>
</html>
